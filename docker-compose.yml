services:
  web:
    build: ./backend
    container_name: ondas_backend
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
    ports:
      - "5000:5000"
    restart: always

  frontend:
    build: ./frontend
    container_name: ondas_crm_frontend
    volumes:
      - .:/app/public
    ports:
      - "3000:3000"
    depends_on:
      - web
    restart: always

